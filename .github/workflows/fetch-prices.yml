name: Fetch Steam Prices

on:
    schedule:
        - cron: "0 4 * * *" # daily at 04:00 UTC
    workflow_dispatch: # manual trigger

jobs:
    fetch:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - uses: astral-sh/setup-uv@e06108dd0aef18192324c70427afc47652e63a82 # v7.5.0

            - run: uv run fetch_prices.py

            - name: Commit results to data branch
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"
                  cp prices.json /tmp/prices.json
                  git fetch origin data
                  git checkout --force data
                  cp /tmp/prices.json prices.json
                  git add prices.json
                  git diff --cached --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H-%M-%S')"
                  git push origin data
