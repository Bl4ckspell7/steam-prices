name: Fetch Steam Prices

on:
    schedule:
        - cron: "0 4,12,20 * * *" # runs daily at 04:00, 12:00, and 20:00 UTC
    workflow_dispatch: # manual trigger

jobs:
    fetch:
        runs-on: ubuntu-latest

        permissions:
            contents: write

        steps:
            - name: Checkout repository
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

            - name: Set up uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
              with:
                  version: "0.10.11"
                  enable-cache: true

            - name: Fetch prices
              run: uv run fetch_prices.py

            - name: Configure git
              run: |
                  git config user.name "github-actions"
                  git config user.email "github-actions@github.com"

            - name: Commit results to data branch
              run: |
                  cp prices.json /tmp/prices.json
                  git fetch origin data
                  git checkout --force data
                  cp /tmp/prices.json prices.json
                  git add prices.json
                  git diff --cached --quiet || git commit -m "Update prices $(date -u +'%Y-%m-%d %H-%M-%S')"
                  git push origin data
